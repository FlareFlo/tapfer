<!DOCTYPE html>
<html>
<head>
	<title>{{filename}}</title>
	{% include "components/style.html" %}
	{% include "components/favicon.html" %}
	{% include "components/meta.html" %}
	<style>
		#delete_button {
			background: crimson;
		}
		#copy_link {
			background: green;
			width: 215px;
		}
		#sha512_box {
            display: block;
            width: 300px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
		}
	</style>
</head>
<body>
<a href="/" class="logo">TAPFER</a>
{%include "components/toast.html" %}
<div class="container">
	<div class="form-box">
		<div class="file-info">
			<p><strong>Filename:</strong> {{filename}}</p>
			<p><strong>MIME Type:</strong> {{mimetype}}</p>
			<p id="expiry"><strong>Expires:</strong> {{expiry}}</p>
			<p><strong>Size:</strong> {{filesize}}<span id="upload_percentage"></span></p>
			<p id="sha512_box"><strong>Sha512:</strong> <a id="sha512_value" href="{{sha512url}}" target="_blank" rel="noreferrer">{{sha512}}</a></p>
		</div>
		<div style="display: flex; gap: 10px;">
			<button id="download_button" class="button">Download</button>
			<form>
				<button id="copy_link" type="button">Copy direct download link</button>
			</form>
			<button id="delete_button">Delete</button>
		</div>
		<div class="hide-on-mobile">
			<code id="curl_command" style="user-select: all; padding: 0.2rem 0 0.2rem 0.2rem;"></code>
			<script>const fmt = `curl -JLO# {{download_url}}`; document.getElementById("curl_command").innerText = fmt</script>
		</div>
		<img id="qrcode" src="data:image/png;base64, {{ qr_b64 }}" width="{{qr_size}}px" height="{{qr_size}}px" alt="">
	</div>
</div>

<script type="module">
    import init, { FileDecrypter } from '/wasm/tapfer_crypt.js';

    const downloadButton = document.getElementById("download_button");

    downloadButton.addEventListener('click', async () => {
        const hash = window.location.hash.substring(1);

        // not encrypted
        if (!hash) {
            const a = document.createElement('a');
            a.href = "{{download_url}}";
            a.download = "{{filename}}";
            a.click();
            return;
        }

        // prevent reload before download is complete
        window.is_downloading = true;

        downloadButton.innerText = "Decrypting...";
        downloadButton.disabled = true;

        try {
            await init();

            let base64 = hash.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) { base64 += '='; }
            const binaryString = atob(base64);
            const combined = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                combined[i] = binaryString.charCodeAt(i);
            }
            const key = combined.slice(0, 32);
            const nonce = combined.slice(32, 40);
            const decrypter = new FileDecrypter(key, nonce);

            const response = await fetch("{{download_url}}");
            if (!response.ok) throw new Error(`Failed to fetch file: ${response.statusText}`);

            const encryptedStream = response.body;

            // This TransformStream re-assembles the arbitrary chunks from the network
            // into the exact chunk sizes the decrypter expects.
            const decryptionTransformer = new TransformStream({
                start() {
                    // Each original 1MB chunk has a 16-byte tag appended by the encryptor.
                    this.CHUNK_SIZE = 1024 * 1024;
                    this.ENCRYPTED_CHUNK_SIZE = this.CHUNK_SIZE + 16;
                    this.buffer = new Uint8Array(0);
                },
                transform(chunk, controller) {
                    // Add new data to the buffer
                    const newBuffer = new Uint8Array(this.buffer.length + chunk.length);
                    newBuffer.set(this.buffer);
                    newBuffer.set(chunk, this.buffer.length);
                    this.buffer = newBuffer;

                    // Process as many full chunks as we can
                    while (this.buffer.length >= this.ENCRYPTED_CHUNK_SIZE) {
                        const chunkToDecrypt = this.buffer.slice(0, this.ENCRYPTED_CHUNK_SIZE);
                        this.buffer = this.buffer.slice(this.ENCRYPTED_CHUNK_SIZE);
                        const decrypted = decrypter.decrypt_chunk(chunkToDecrypt, false);
                        controller.enqueue(decrypted);
                    }
                },
                flush(controller) {
                    // If theres any data left in the buffer, it must be the last chunk
                    if (this.buffer.length > 0) {
                        const decrypted = decrypter.decrypt_chunk(this.buffer, true);
                        controller.enqueue(decrypted);
                    }
                    decrypter.free();
                }
            });

            const decryptedStream = encryptedStream.pipeThrough(decryptionTransformer);

            // Convert the decrypted stream to a Blob to make it downloadable.
            // NOTE: This will buffer the entire DECRYPTED file in memory.
            // For true large file streaming-to-disk, the File System Access API
            // or a library like stream-saver.js would be required.
            const decryptedBlob = await new Response(decryptedStream).blob();

            const url = URL.createObjectURL(decryptedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "{{filename}}";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            downloadButton.innerText = "Downloaded!";

        } catch (err) {
            console.error("Decryption/Download failed:", err);
            alert("Decryption failed! The key might be wrong or the file is corrupted.");
            downloadButton.innerText = "Download Failed";
        } finally {
            downloadButton.disabled = false;
        }
    });
</script>

<script>
    {% include "components/ws_shutdown_listener.js" %}

	const copy_link = document.getElementById('copy_link');
	copy_link.addEventListener('click', async () => {
		try {
			await navigator.clipboard.writeText(window.location.href);
			copy_link.innerText = "Copied!";
            setTimeout(() => {
                copy_link.innerText = "Copy direct download link";
			}, 3000);
		} catch (err) {
			console.error('Failed to copy: ', err);
		}
	});

    const delete_button = document.getElementById("delete_button");
    delete_button.addEventListener('click', async () => {
        await fetch("{{delete_url}}", {method: 'DELETE'}).then(res => {
            console.log(res);
            if (res.ok && res.redirected) {
                window.location.href = res.url;
			}
		});
	});

	function main() {
		// Do not parse, as the server will set the expiry string properly
		const realtime = {{ unix_expiry}};
		if (realtime == 0) {
			return;
		}
		const date = new Date(realtime * 1000);
		const pad = (n) => n.toString().padStart(2, '0');

		const hours = pad(date.getHours());
		const minutes = pad(date.getMinutes());
		const day = pad(date.getDate());
		const month = pad(date.getMonth() + 1); // Months are zero-based
		const year = date.getFullYear();

		const formatted = `${hours}:${minutes} ${day}-${month}-${year}`;

		document.getElementById('expiry').innerHTML = `<strong>Expires:</strong> ${formatted}`;
	}
	main()

	const ws = new WebSocket("{{ws_url}}");

	ws.addEventListener("error", (e) => {
		console.error("Failed to openWS:", e);
        show_toast("Failed to open WS", "error");
	});

	ws.addEventListener("open", () => {
		console.log("WS opened!");
	});

	let upload_percentage = document.getElementById("upload_percentage");
    let sha512_value = document.getElementById("sha512_value");
	ws.addEventListener("message", (e) => {
		const payload = JSON.parse(e.data);
		switch (payload.event.key) {
			case "DeleteAsset":
				if (!window.is_downloading) {
                    // TODO: Delay until ready, then perform action instead of not doing it at all
					window.location.reload();
				}
				break;
			case "UploadProgress":
				const total = payload.event.total;
				const progress = payload.event.progress;
				let percentage = (progress / total) * 100;
				upload_percentage.innerText = ` Uploading(${percentage.toFixed(1)}%)`;
				break;
			case "UploadComplete":
				upload_percentage.innerText = "";
				break;
			case "Sha512Ready":
                sha512_value.innerText = payload.event.chksum;
                break;
		}
	});
    ws_shutdown_listener(ws);
</script>
</body>
</html>
